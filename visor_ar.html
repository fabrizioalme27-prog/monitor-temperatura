<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Gemelo Digital AR - Eje 2 Robot</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-marker preset="hiro">
            <a-entity light="type: ambient; color: #BBB"></a-entity>
            <a-entity light="type: directional; color: #FFF; intensity: 0.6" position="-0.5 1 1"></a-entity>
            <a-entity id="gear-model" position="0 0.5 0" scale="0.3 0.3 0.3"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear">
                <!-- Si tienes el archivo .glb, puedes reemplazar las geometrias nativas de abajo por esto: -->
                <a-entity gltf-model="url(ENGRANAJE EJE 2.glb)"></a-entity>
                <a-cylinder radius="1" height="0.4" color="#bd00ff" roughness="0.3" metalness="0.8"></a-cylinder>
                <a-cylinder radius="0.25" height="0.6" color="#333"></a-cylinder>
                <a-box position="1 0 0" scale="0.3 0.4 0.25" color="#ff007f"></a-box>
                <a-box position="-1 0 0" scale="0.3 0.4 0.25" color="#ff007f"></a-box>
                <a-box position="0 0 1" scale="0.25 0.4 0.3" color="#ff007f"></a-box>
                <a-box position="0 0 -1" scale="0.25 0.4 0.3" color="#ff007f"></a-box>
            </a-entity>
            <a-text value="GEMELO DIGITAL: EJE 2" position="-1 1.2 0" color="#bd00ff" width="4"></a-text>
            <a-text value="Engranaje Acoplado Correctamente" position="-1.2 1.0 0" color="#39ff14" width="3"></a-text>
        </a-marker>
        <a-entity camera></a-entity>
    </a-scene>
</body>

</html>
